<svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 圆形外框 -->
  <circle cx="15" cy="15" r="12" 
          stroke="#222222" 
          stroke-width="1.8" 
          stroke-linecap="round"/>
  <!-- 水平加号 -->
  <line x1="9" y1="15" x2="21" y2="15" 
        stroke="#222222" 
        stroke-width="1.8" 
        stroke-linecap="round"/>
  <!-- 垂直加号 -->
  <line x1="15" y1="9" x2="15" y2="21" 
        stroke="#222222" 
        stroke-width="1.8" 
        stroke-linecap="round"/>
</svg>
